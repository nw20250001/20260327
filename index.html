<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西北社區公告產生器 - AI 智慧存檔版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');
        
        :root {
            --preview-zoom: 0.4;
        }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f1f5f9;
        }

        .font-serif-tc {
            font-family: 'Noto Serif TC', serif;
        }

        #print-area {
            width: 210mm;
            height: 297mm;
            min-width: 210mm;
            min-height: 297mm;
            transform: scale(var(--preview-zoom));
            transform-origin: top center;
            background: white;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .preview-container {
            height: calc(297mm * var(--preview-zoom) + 20px);
        }

        @media (min-width: 1024px) {
            :root { --preview-zoom: 0.72; }
        }
        @media (min-width: 1280px) {
            :root { --preview-zoom: 0.85; }
        }
        @media (max-width: 640px) {
            :root { --preview-zoom: 0.35; }
            #print-area {
                margin-top: -20px;
            }
        }

        #print-area::-webkit-scrollbar { display: none; }

        /* History Panel Overlay */
        #history-panel {
            transition: transform 0.3s ease-in-out;
            transform: translateX(100%);
        }
        #history-panel.active {
            transform: translateX(0);
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                transform: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body class="overflow-x-hidden">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-[100] flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i data-lucide="file-text" class="text-red-500"></i>
            <h1 class="font-bold tracking-tighter text-lg">西北社區公告產生器</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="toggle-history" class="p-2 hover:bg-slate-800 rounded-full transition-colors relative">
                <i data-lucide="history" size="22"></i>
                <span id="history-badge" class="absolute top-0 right-0 bg-red-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden">0</span>
            </button>
            <button id="save-btn" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                <i data-lucide="save" size="18"></i>
                <span class="hidden sm:inline">儲存</span>
            </button>
            <button id="download-btn" class="bg-red-600 hover:bg-red-700 active:scale-95 text-white px-5 py-2 rounded-full text-sm font-bold transition-all shadow-lg flex items-center gap-2">
                <i data-lucide="download" size="18"></i>
                <span>下載 PDF</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8 p-4 md:p-8">
        
        <!-- 左側控制面板 -->
        <div class="w-full lg:w-[400px] flex flex-col gap-6 shrink-0">
            
            <!-- AI 助理面板 -->
            <section class="bg-gradient-to-br from-slate-800 to-indigo-900 p-6 rounded-[2rem] shadow-xl text-white">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="sparkles" class="text-yellow-400"></i>
                    <h2 class="font-bold text-lg">AI 智慧助手</h2>
                </div>
                <textarea id="ai-input" placeholder="例如：通知住戶下週清洗水塔，暫停供水四小時..." class="w-full bg-white/10 border border-white/20 rounded-2xl p-4 text-sm text-white placeholder:text-white/30 outline-none focus:bg-white/20 transition-all h-20 resize-none mb-3"></textarea>
                <button id="ai-gen-btn" class="w-full flex items-center justify-center gap-2 bg-yellow-400 hover:bg-yellow-300 text-indigo-950 py-3 rounded-2xl font-bold text-sm transition-all disabled:opacity-50">
                    <i data-lucide="wand-2" size="18"></i>
                    <span id="ai-btn-text">立即智慧生成</span>
                </button>
                <p id="error-msg" class="hidden mt-2 text-[10px] text-red-300 text-center"></p>
            </section>

            <!-- 手動編輯表單 -->
            <section class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm space-y-4">
                <div class="flex items-center gap-2 text-slate-800 font-bold border-b pb-3 border-slate-100">
                    <i data-lucide="edit-3" class="text-red-600"></i>
                    <h2>公告詳細設定</h2>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">社區名稱</label>
                        <input type="text" id="community-name" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm" value="幸福綠洲社區管理委員會">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告字號</label>
                            <input type="text" id="notice-id" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm" value="1140852">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告日期</label>
                            <input type="text" id="notice-date-input" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告主旨</label>
                        <input type="text" id="subject" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold" placeholder="輸入公告主旨">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">說明內容</label>
                        <textarea id="description" rows="10" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm leading-relaxed resize-none" placeholder="輸入詳細說明內容"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <input type="text" id="department" placeholder="發佈單位" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs" value="物業管理中心 敬啟">
                        <input type="text" id="footer" placeholder="聯繫資訊" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs" value="如有任何疑問，請洽社區櫃檯：(02) 2345-6789">
                    </div>
                </div>
            </section>
        </div>

        <!-- 右側預覽區域 -->
        <div class="flex-grow flex flex-col items-center overflow-visible relative">
            <div class="mb-4 text-xs font-bold text-slate-400 flex items-center gap-2 uppercase tracking-widest">
                <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                A4 標準預覽面板
            </div>
            
            <div class="relative w-full flex justify-center preview-container">
                <!-- A4 畫布 -->
                <div id="print-area" class="overflow-hidden">
                    <div class="h-full w-full p-[20mm] flex flex-col text-black font-serif-tc bg-white box-border">
                        
                        <!-- 頁首 -->
                        <div class="text-center border-b-[6px] border-red-600 pb-4 mb-6 shrink-0">
                            <h1 class="text-5xl font-black text-red-600 mb-2 tracking-[0.8em] ml-[0.8em]">公告</h1>
                            <div id="view-community-name" class="text-xl font-bold tracking-[0.3em] uppercase">幸福綠洲社區管理委員會</div>
                        </div>

                        <!-- 元數據 -->
                        <div class="flex justify-between items-end mb-6 font-bold text-base shrink-0">
                            <div class="border-b-[1px] border-slate-800 pb-0.5 px-3 text-slate-700">
                                字第 <span id="view-id">1140852</span> 號
                            </div>
                            <div class="text-slate-700">中華民國 <span id="view-date">2025年4月1日</span></div>
                        </div>

                        <!-- 主旨 -->
                        <div class="bg-slate-50 border-l-[12px] border-slate-800 p-6 mb-6 shrink-0 shadow-sm">
                            <span class="text-[10px] font-black text-slate-400 block mb-1 tracking-[0.2em]">【 公告主旨 SUBJECT 】</span>
                            <h2 id="view-subject" class="text-2xl font-black leading-tight text-slate-900 min-h-[1.2em]">
                                請輸入或生成主旨
                            </h2>
                        </div>

                        <!-- 說明內容 -->
                        <div class="flex-grow overflow-hidden px-2">
                            <span class="text-[10px] font-black text-slate-400 block mb-3 tracking-[0.2em]">【 說明內容 DESCRIPTION 】</span>
                            <div id="view-description" class="text-[1.3rem] leading-[1.8] whitespace-pre-wrap text-justify font-medium text-slate-800">
                                請輸入詳細說明內容...
                            </div>
                        </div>

                        <!-- 頁尾用印 -->
                        <div class="mt-6 pt-6 border-t border-slate-100 shrink-0 flex justify-between items-end">
                            <div class="max-w-[50%] space-y-2">
                                <div class="flex items-center gap-2 text-slate-400 text-xs italic">
                                    <i data-lucide="phone" size="12"></i>
                                    <span id="view-footer">如有疑問請洽櫃台</span>
                                </div>
                                <div class="h-1 w-16 bg-red-600"></div>
                            </div>
                            
                            <div class="text-right">
                                <div id="view-community-name-foot" class="text-lg font-bold text-slate-600">幸福綠洲社區</div>
                                <div id="view-department" class="text-3xl font-black mt-1 tracking-tighter text-slate-900">物業管理中心 敬啟</div>
                                <div class="mt-2 flex justify-end">
                                    <div class="w-24 h-24 border-2 border-red-500/20 rounded-full flex items-center justify-center text-red-500/20 font-black text-lg border-dashed transform rotate-12 select-none">
                                        管委會印
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 歷史紀錄面板 -->
    <div id="history-panel" class="fixed top-0 right-0 h-full w-full sm:w-[350px] bg-white shadow-2xl z-[200] flex flex-col">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="history" size="20" class="text-red-500"></i>
                <h2 class="font-bold">歷史公告紀錄</h2>
            </div>
            <button id="close-history" class="p-1 hover:bg-slate-700 rounded-lg">
                <i data-lucide="x" size="24"></i>
            </button>
        </div>
        <div id="history-list" class="flex-grow overflow-y-auto p-4 space-y-4">
            <!-- 歷史項將在此載入 -->
            <div class="text-center py-10 text-slate-400 text-sm">尚未有存檔紀錄</div>
        </div>
        <div class="p-4 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 text-center">歷史紀錄儲存於您的瀏覽器中</p>
        </div>
    </div>

    <!-- 簡易 Toast 提示 -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl text-sm font-medium z-[300] transition-opacity opacity-0 pointer-events-none">
        存檔成功
    </div>

    <script>
        lucide.createIcons();

        const state = {
            isAiLoading: false,
            isGenerating: false,
            history: JSON.parse(localStorage.getItem('notice_history') || '[]')
        };

        const inputs = {
            communityName: document.getElementById('community-name'),
            noticeId: document.getElementById('notice-id'),
            noticeDate: document.getElementById('notice-date-input'),
            subject: document.getElementById('subject'),
            description: document.getElementById('description'),
            department: document.getElementById('department'),
            footer: document.getElementById('footer'),
            aiInput: document.getElementById('ai-input')
        };

        const views = {
            communityName: document.getElementById('view-community-name'),
            communityNameFoot: document.getElementById('view-community-name-foot'),
            id: document.getElementById('view-id'),
            date: document.getElementById('view-date'),
            subject: document.getElementById('view-subject'),
            description: document.getElementById('view-description'),
            department: document.getElementById('view-department'),
            footer: document.getElementById('view-footer')
        };

        function updatePreview() {
            views.communityName.innerText = inputs.communityName.value || '未設定社區名稱';
            views.communityNameFoot.innerText = (inputs.communityName.value || '未設定').replace('管理委員會', '').replace('管委會', '');
            views.id.innerText = inputs.noticeId.value || '______';
            views.date.innerText = inputs.noticeDate.value || '____年__月__日';
            views.subject.innerText = inputs.subject.value || '（請輸入公告主旨）';
            views.description.innerText = inputs.description.value || '（請輸入公告詳細說明內容...）';
            views.department.innerText = inputs.department.value;
            views.footer.innerText = inputs.footer.value;
        }

        // 監聽輸入
        Object.keys(inputs).forEach(key => {
            if (key !== 'aiInput') {
                inputs[key].addEventListener('input', updatePreview);
            }
        });

        // 初始日期
        const today = new Date();
        const rocYear = today.getFullYear() - 1911;
        inputs.noticeDate.value = `${rocYear}年${today.getMonth() + 1}月${today.getDate()}日`;
        
        // 預設內容
        inputs.subject.value = "社區外牆清洗作業通知";
        inputs.description.value = "親愛的住戶您好：\n\n為維護社區整潔，預計於下週進行外牆清洗，請配合關閉門窗並移除陽台物品。造成不便敬請見諒。";
        updatePreview();

        // --- 存檔功能 ---
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.innerText = text;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function saveToHistory() {
            const newItem = {
                id: Date.now(),
                communityName: inputs.communityName.value,
                noticeId: inputs.noticeId.value,
                noticeDate: inputs.noticeDate.value,
                subject: inputs.subject.value,
                description: inputs.description.value,
                department: inputs.department.value,
                footer: inputs.footer.value,
                timestamp: new Date().toLocaleString()
            };
            
            state.history.unshift(newItem);
            if (state.history.length > 50) state.history.pop(); // 上限 50 筆
            localStorage.setItem('notice_history', JSON.stringify(state.history));
            renderHistory();
            showToast('已儲存至歷史紀錄');
        }

        document.getElementById('save-btn').addEventListener('click', saveToHistory);

        // --- 歷史紀錄渲染 ---
        function renderHistory() {
            const list = document.getElementById('history-list');
            const badge = document.getElementById('history-badge');
            
            badge.innerText = state.history.length;
            badge.classList.toggle('hidden', state.history.length === 0);

            if (state.history.length === 0) {
                list.innerHTML = '<div class="text-center py-10 text-slate-400 text-sm">尚未有存檔紀錄</div>';
                return;
            }

            list.innerHTML = state.history.map(item => `
                <div class="bg-slate-50 border border-slate-200 p-4 rounded-2xl group relative hover:border-red-200 transition-colors">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-bold text-red-600 bg-red-50 px-2 py-0.5 rounded-full">${item.noticeId}</span>
                        <span class="text-[10px] text-slate-400">${item.timestamp}</span>
                    </div>
                    <h3 class="text-sm font-bold text-slate-800 line-clamp-1 mb-1">${item.subject}</h3>
                    <p class="text-xs text-slate-500 line-clamp-2 mb-3">${item.description}</p>
                    <div class="flex gap-2">
                        <button onclick="loadHistoryItem(${item.id})" class="flex-grow bg-white border border-slate-200 hover:bg-slate-100 text-[11px] font-bold py-1.5 rounded-lg transition-colors">載入</button>
                        <button onclick="deleteHistoryItem(${item.id})" class="px-2 text-slate-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size="14"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.loadHistoryItem = (id) => {
            const item = state.history.find(h => h.id === id);
            if (!item) return;

            inputs.communityName.value = item.communityName;
            inputs.noticeId.value = item.noticeId;
            inputs.noticeDate.value = item.noticeDate;
            inputs.subject.value = item.subject;
            inputs.description.value = item.description;
            inputs.department.value = item.department;
            inputs.footer.value = item.footer;
            
            updatePreview();
            document.getElementById('history-panel').classList.remove('active');
            showToast('已載入存檔');
        };

        window.deleteHistoryItem = (id) => {
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('notice_history', JSON.stringify(state.history));
            renderHistory();
        };

        // 面板切換
        document.getElementById('toggle-history').addEventListener('click', () => {
            document.getElementById('history-panel').classList.add('active');
        });
        document.getElementById('close-history').addEventListener('click', () => {
            document.getElementById('history-panel').classList.remove('active');
        });

        // --- AI 生成邏輯 ---
        const aiBtn = document.getElementById('ai-gen-btn');
        const aiBtnText = document.getElementById('ai-btn-text');
        const errorMsg = document.getElementById('error-msg');

        aiBtn.addEventListener('click', async () => {
            const prompt = inputs.aiInput.value.trim();
            if (!prompt || state.isAiLoading) return;

            state.isAiLoading = true;
            aiBtn.disabled = true;
            aiBtnText.innerText = 'AI 構思中...';
            errorMsg.classList.add('hidden');

            const apiKey = ""; 
            const systemPrompt = `你是一位資深的物業管理顧問。請生成一份正式的社區公告。
            JSON 格式要求：
            - subject: 公告核心主旨（精簡，20字內，不含細節日期）。
            - description: 詳細內容（包含正式招呼、條列要點、注意事項、禮貌結語）。
            確保主旨與內容區隔明確，內容不超過350字以利A4單頁呈現。`;

            async function fetchAi(retries = 3) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `主題：${prompt}` }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: {
                                responseMimeType: "application/json",
                                responseSchema: {
                                    type: "OBJECT",
                                    properties: {
                                        subject: { type: "STRING" },
                                        description: { type: "STRING" }
                                    },
                                    required: ["subject", "description"]
                                }
                            }
                        })
                    });
                    if (!response.ok) throw new Error('API Error');
                    const result = await response.json();
                    return JSON.parse(result.candidates[0].content.parts[0].text);
                } catch (err) {
                    if (retries > 0) return fetchAi(retries - 1);
                    throw err;
                }
            }

            try {
                const data = await fetchAi();
                inputs.subject.value = data.subject;
                inputs.description.value = data.description;
                inputs.aiInput.value = '';
                updatePreview();
                showToast('AI 生成成功');
            } catch (err) {
                errorMsg.innerText = 'AI 暫時離線，請手動輸入內容。';
                errorMsg.classList.remove('hidden');
            } finally {
                state.isAiLoading = false;
                aiBtn.disabled = false;
                aiBtnText.innerText = '立即智慧生成';
            }
        });

        // --- PDF 下載邏輯 ---
        const downloadBtn = document.getElementById('download-btn');
        const btnText = document.getElementById('btn-text');

        downloadBtn.addEventListener('click', async () => {
            if (state.isGenerating) return;
            state.isGenerating = true;
            downloadBtn.classList.add('opacity-70');
            btnText.innerText = '處理中...';

            try {
                const element = document.getElementById('print-area');
                const originalStyle = element.getAttribute('style');
                
                element.style.transform = 'none';
                element.style.position = 'fixed';
                element.style.top = '0';
                element.style.left = '0';
                element.style.zIndex = '-1';
                element.style.margin = '0';

                const canvas = await html2canvas(element, {
                    scale: 2,
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    width: 794,
                    height: 1123
                });

                element.setAttribute('style', originalStyle);

                const imgData = canvas.toDataURL('image/png');
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(imgData, 'PNG', 0, 0, 210, 297);
                pdf.save(`社區公告_${inputs.noticeId.value || Date.now()}.pdf`);

            } catch (err) {
                console.error(err);
            } finally {
                state.isGenerating = false;
                downloadBtn.classList.remove('opacity-70');
                btnText.innerText = '下載 PDF';
            }
        });

        // 初始載入紀錄
        renderHistory();
    </script>
</body>
</html>
