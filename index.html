<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社區公告產生器 - AI 修復增強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Serif+TC:wght@600;900&display=swap');
        
        :root {
            --preview-zoom: 0.35;
        }
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
        }

        .font-serif-tc {
            font-family: 'Noto Serif TC', serif;
        }

        /* A4 容器基礎設定 */
        #a4-preview {
            width: 210mm;
            height: 297mm;
            min-width: 210mm;
            min-height: 297mm;
            transform: scale(var(--preview-zoom));
            transform-origin: top center;
            background: white;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .preview-wrapper {
            height: calc(297mm * var(--preview-zoom) + 40px);
        }

        @media (min-width: 1024px) {
            :root { --preview-zoom: 0.75; }
        }
        @media (min-width: 1280px) {
            :root { --preview-zoom: 0.85; }
        }
        @media (max-width: 640px) {
            :root { --preview-zoom: 0.38; }
            #a4-preview {
                margin-top: -10px;
            }
        }

        #history-drawer {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media print {
            body * { visibility: hidden; }
            #a4-preview, #a4-preview * { visibility: visible; }
            #a4-preview {
                position: absolute;
                left: 0;
                top: 0;
                transform: none !important;
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body class="overflow-x-hidden text-slate-900">

    <!-- 導覽列 -->
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-[100] flex justify-between items-center shadow-xl">
        <div class="flex items-center gap-2">
            <i data-lucide="building-2" class="text-blue-400"></i>
            <h1 class="font-bold tracking-tight text-lg">社區公告 AI 助手</h1>
        </div>
        <div class="flex items-center gap-2">
            <button id="btn-history" class="p-2 hover:bg-slate-800 rounded-xl transition-colors relative">
                <i data-lucide="history" size="22"></i>
                <span id="history-count" class="absolute -top-1 -right-1 bg-blue-500 text-[10px] w-4 h-4 rounded-full flex items-center justify-center hidden font-bold">0</span>
            </button>
            <button id="btn-save" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 transition-transform active:scale-95">
                <i data-lucide="save" size="18"></i>
                <span class="hidden sm:inline">暫存內容</span>
            </button>
            <button id="btn-download" class="bg-blue-600 hover:bg-blue-700 active:scale-95 text-white px-5 py-2 rounded-xl text-sm font-bold transition-all shadow-lg flex items-center gap-2">
                <i data-lucide="file-down" size="18"></i>
                <span>下載 PDF</span>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6 p-4 lg:p-8">
        
        <!-- 左側編輯區 -->
        <div class="w-full lg:w-[400px] flex flex-col gap-6 shrink-0">
            
            <!-- AI 生成模組 -->
            <div class="bg-gradient-to-br from-indigo-900 to-slate-900 p-6 rounded-3xl shadow-xl text-white">
                <div class="flex items-center gap-2 mb-4">
                    <i data-lucide="sparkles" class="text-blue-400"></i>
                    <h2 class="font-bold">AI 智慧生成內容</h2>
                </div>
                <div class="space-y-4">
                    <textarea id="ai-prompt" placeholder="請描述您的公告需求... (例如：提醒下週二清洗水塔、外牆磁磚剝落維修通知)" class="w-full bg-white/10 border border-white/20 rounded-2xl p-4 text-sm text-white placeholder:text-white/40 outline-none focus:bg-white/20 focus:border-blue-400/50 transition-all h-24 resize-none leading-relaxed"></textarea>
                    <button id="btn-ai-generate" class="w-full flex items-center justify-center gap-2 bg-blue-500 hover:bg-blue-400 text-white py-3 rounded-2xl font-bold text-sm transition-all shadow-lg active:scale-95 disabled:opacity-50">
                        <i data-lucide="wand-2" size="18" id="ai-icon"></i>
                        <span id="ai-text">啟動 AI 生成</span>
                    </button>
                    <p id="ai-error" class="hidden text-[11px] text-red-300 text-center bg-red-900/30 p-2 rounded-lg"></p>
                </div>
            </div>

            <!-- 手動填寫模組 -->
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-5">
                <div class="flex items-center gap-2 text-slate-800 font-bold border-b pb-3 border-slate-100">
                    <i data-lucide="pencil-line" class="text-blue-600"></i>
                    <h2>公告明細設定</h2>
                </div>
                <div class="space-y-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">社區/管委會名稱</label>
                        <input type="text" id="in-community" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:border-blue-500 outline-none transition-all" value="台北之星社區管理委員會">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告字號</label>
                            <input type="text" id="in-id" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:border-blue-500 outline-none" value="114字第001號">
                        </div>
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告日期</label>
                            <input type="text" id="in-date" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:border-blue-500 outline-none">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">公告主旨</label>
                        <input type="text" id="in-subject" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold focus:border-blue-500 outline-none" placeholder="輸入公告主旨">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">說明內容</label>
                        <textarea id="in-desc" rows="12" class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm leading-relaxed resize-none focus:border-blue-500 outline-none" placeholder="輸入詳細內容..."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <input type="text" id="in-dept" placeholder="單位 (例：總務組)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs" value="社區管理委員會">
                        <input type="text" id="in-foot" placeholder="備註 (例：電話)" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-xs" value="如有疑問請洽：(02) 2345-6789">
                    </div>
                </div>
            </div>
        </div>

        <!-- 右側預覽區 -->
        <div class="flex-grow flex flex-col items-center">
            <div class="mb-4 text-xs font-bold text-slate-400 flex items-center gap-2 uppercase tracking-[0.2em]">
                <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div>
                A4 正式公告預覽
            </div>
            
            <div class="preview-wrapper w-full flex justify-center overflow-visible">
                <!-- A4 畫布 -->
                <div id="a4-preview" class="overflow-hidden">
                    <div class="h-full w-full p-[18mm] flex flex-col text-black font-serif-tc bg-white box-border relative">
                        
                        <!-- 標頭區 -->
                        <div class="text-center border-b-[5px] border-red-600 pb-3 mb-5 shrink-0">
                            <h1 class="text-4xl font-black text-red-600 mb-2 tracking-[0.8em] ml-[0.8em]">公告</h1>
                            <div id="v-community" class="text-lg font-bold tracking-[0.2em]">社區管理委員會</div>
                        </div>

                        <!-- 字號日期區 -->
                        <div class="flex justify-between items-end mb-4 font-bold text-sm shrink-0">
                            <div class="border-b-[1px] border-slate-800 pb-0.5 px-3">
                                字第 <span id="v-id">______</span> 號
                            </div>
                            <div>中華民國 <span id="v-date">____年__月__日</span></div>
                        </div>

                        <!-- 主旨區 -->
                        <div class="bg-slate-50 border-l-[10px] border-slate-900 p-4 mb-5 shrink-0 shadow-sm">
                            <span class="text-[9px] font-black text-slate-400 block mb-1 tracking-widest uppercase italic">【 公告主旨 Subject 】</span>
                            <h2 id="v-subject" class="text-xl font-black leading-tight">請輸入主旨...</h2>
                        </div>

                        <!-- 說明區 - 最大化空間 -->
                        <div class="flex-grow overflow-hidden px-2">
                            <span class="text-[9px] font-black text-slate-400 block mb-3 tracking-widest uppercase italic">【 說明內容 Description 】</span>
                            <div id="v-desc" class="text-[1.2rem] leading-[1.8] whitespace-pre-wrap text-justify font-medium">
                                請輸入內容...
                            </div>
                        </div>

                        <!-- 頁尾區 -->
                        <div class="mt-4 pt-4 border-t border-slate-100 shrink-0 flex justify-between items-end">
                            <div class="max-w-[50%]">
                                <div class="flex items-center gap-1.5 text-slate-400 text-[10px] italic">
                                    <i data-lucide="info" size="10"></i>
                                    <span id="v-foot">如有疑問請洽管理處</span>
                                </div>
                                <div class="h-0.5 w-12 bg-red-600 mt-2"></div>
                            </div>
                            
                            <div class="text-right">
                                <div id="v-comm-foot" class="text-base font-bold text-slate-700 leading-none">社區管理委員會</div>
                                <div id="v-dept" class="text-2xl font-black mt-2 tracking-tighter leading-none">敬 啟</div>
                                <div class="mt-2 flex justify-end">
                                    <div class="w-16 h-16 border-2 border-red-500/10 rounded-full flex items-center justify-center text-red-500/20 font-black text-[10px] border-dashed transform rotate-12">
                                        管委會印
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 歷史側欄 -->
    <div id="history-drawer" class="fixed top-0 right-0 h-full w-full sm:w-[380px] bg-white shadow-2xl z-[200] flex flex-col border-l border-slate-200 transform translate-x-full">
        <div class="p-6 bg-slate-900 text-white flex justify-between items-center shrink-0">
            <div class="flex items-center gap-2">
                <i data-lucide="history" size="20" class="text-blue-400"></i>
                <h2 class="font-bold">公告歷史存檔</h2>
            </div>
            <button id="close-drawer" class="p-2 hover:bg-slate-800 rounded-full">
                <i data-lucide="x" size="24"></i>
            </button>
        </div>
        <div id="history-list" class="flex-grow overflow-y-auto p-4 space-y-4 bg-slate-50"></div>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-bold z-[300] opacity-0 transition-all pointer-events-none transform translate-y-4"></div>

    <script>
        // 初始化 Lucide 圖示
        lucide.createIcons();

        const state = {
            isAiLoading: false,
            isDownloading: false,
            history: JSON.parse(localStorage.getItem('notice_history') || '[]')
        };

        const dom = {
            inCommunity: document.getElementById('in-community'),
            inId: document.getElementById('in-id'),
            inDate: document.getElementById('in-date'),
            inSubject: document.getElementById('in-subject'),
            inDesc: document.getElementById('in-desc'),
            inDept: document.getElementById('in-dept'),
            inFoot: document.getElementById('in-foot'),
            vCommunity: document.getElementById('v-community'),
            vCommFoot: document.getElementById('v-comm-foot'),
            vId: document.getElementById('v-id'),
            vDate: document.getElementById('v-date'),
            vSubject: document.getElementById('v-subject'),
            vDesc: document.getElementById('v-desc'),
            vDept: document.getElementById('v-dept'),
            vFoot: document.getElementById('v-foot'),
            aiPrompt: document.getElementById('ai-prompt'),
            aiBtn: document.getElementById('btn-ai-generate'),
            aiText: document.getElementById('ai-text'),
            aiIcon: document.getElementById('ai-icon'),
            aiError: document.getElementById('ai-error'),
            drawer: document.getElementById('history-drawer'),
            historyList: document.getElementById('history-list'),
            historyCount: document.getElementById('history-count'),
            toast: document.getElementById('toast')
        };

        // 更新預覽邏輯
        function updatePreview() {
            dom.vCommunity.innerText = dom.inCommunity.value || '社區管理委員會';
            dom.vCommFoot.innerText = (dom.inCommunity.value || '社區管理委員會').replace('管理委員會', '').replace('委員會', '').replace('管理中心', '');
            dom.vId.innerText = dom.inId.value || '______';
            dom.vDate.innerText = dom.inDate.value || '____年__月__日';
            dom.vSubject.innerText = dom.inSubject.value || '公告主旨';
            dom.vDesc.innerText = dom.inDesc.value || '說明內容...';
            dom.vDept.innerText = dom.inDept.value;
            dom.vFoot.innerText = dom.inFoot.value;
        }

        [dom.inCommunity, dom.inId, dom.inDate, dom.inSubject, dom.inDesc, dom.inDept, dom.inFoot].forEach(el => {
            el.addEventListener('input', updatePreview);
        });

        // 初始設定日期
        const today = new Date();
        const rocDate = `${today.getFullYear() - 1911}年${today.getMonth() + 1}月${today.getDate()}日`;
        dom.inDate.value = rocDate;
        updatePreview();

        // Toast 提示
        function showToast(msg) {
            dom.toast.innerText = msg;
            dom.toast.classList.remove('opacity-0', 'translate-y-4');
            dom.toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                dom.toast.classList.add('opacity-0', 'translate-y-4');
                dom.toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        // --- AI 修復版核心邏輯 ---
        async function handleAiGenerate() {
            const userInput = dom.aiPrompt.value.trim();
            if (!userInput || state.isAiLoading) return;

            state.isAiLoading = true;
            dom.aiBtn.disabled = true;
            dom.aiText.innerText = 'AI 正努力構思中...';
            dom.aiError.classList.add('hidden');
            dom.aiIcon.classList.add('animate-spin');

            const apiKey = ""; // 環境自動注入
            const systemPrompt = "你是一位專業的物業經理。請為社區生成正式公告。主旨(subject)必須精簡(20字內)。說明內容(description)必須包含禮貌招呼、詳細條列事項與結尾。請以繁體中文回答。";

            const payload = {
                contents: [{ parts: [{ text: `我的公告需求是：${userInput}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            subject: { type: "STRING" },
                            description: { type: "STRING" }
                        },
                        required: ["subject", "description"]
                    }
                }
            };

            // 指數退避重試邏輯
            async function fetchWithRetry(retries = 5, delay = 1000) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!text) throw new Error('API 無法生成內容');
                    return JSON.parse(text);
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(r => setTimeout(r, delay));
                        return fetchWithRetry(retries - 1, delay * 2);
                    }
                    throw err;
                }
            }

            try {
                const result = await fetchWithRetry();
                dom.inSubject.value = result.subject;
                dom.inDesc.value = result.description;
                dom.aiPrompt.value = '';
                updatePreview();
                showToast('AI 公告生成成功！');
            } catch (err) {
                console.error('AI Error:', err);
                dom.aiError.innerText = 'AI 生成暫時無回應，請確認網路或稍後再試。';
                dom.aiError.classList.remove('hidden');
            } finally {
                state.isAiLoading = false;
                dom.aiBtn.disabled = false;
                dom.aiText.innerText = '啟動 AI 生成';
                dom.aiIcon.classList.remove('animate-spin');
            }
        }

        dom.aiBtn.addEventListener('click', handleAiGenerate);

        // --- 存檔功能 ---
        function saveHistory() {
            const data = {
                id: Date.now(),
                comm: dom.inCommunity.value,
                noticeId: dom.inId.value,
                date: dom.inDate.value,
                subj: dom.inSubject.value,
                desc: dom.inDesc.value,
                dept: dom.inDept.value,
                foot: dom.inFoot.value,
                time: new Date().toLocaleString()
            };
            state.history.unshift(data);
            if (state.history.length > 30) state.history.pop();
            localStorage.setItem('notice_history', JSON.stringify(state.history));
            renderHistory();
            showToast('已儲存至歷史紀錄');
        }

        function renderHistory() {
            dom.historyCount.innerText = state.history.length;
            dom.historyCount.classList.toggle('hidden', state.history.length === 0);
            
            if (state.history.length === 0) {
                dom.historyList.innerHTML = '<div class="text-center py-20 text-slate-400 text-sm">尚未有存檔紀錄</div>';
                return;
            }

            dom.historyList.innerHTML = state.history.map(item => `
                <div class="bg-white border border-slate-200 p-4 rounded-2xl shadow-sm hover:border-blue-300 transition-all group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[9px] font-bold text-blue-600 bg-blue-50 px-2 py-0.5 rounded-full">${item.noticeId}</span>
                        <span class="text-[9px] text-slate-400">${item.time}</span>
                    </div>
                    <h3 class="text-sm font-bold text-slate-800 line-clamp-1 mb-1">${item.subj}</h3>
                    <div class="flex gap-2 mt-4">
                        <button onclick="loadNotice(${item.id})" class="flex-grow bg-slate-900 text-white text-[11px] font-bold py-2 rounded-xl active:scale-95 transition-all">載入編輯</button>
                        <button onclick="deleteNotice(${item.id})" class="p-2 text-slate-300 hover:text-red-500 transition-colors">
                            <i data-lucide="trash-2" size="14"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.loadNotice = (id) => {
            const item = state.history.find(h => h.id === id);
            if (!item) return;
            dom.inCommunity.value = item.comm;
            dom.inId.value = item.noticeId;
            dom.inDate.value = item.date;
            dom.inSubject.value = item.subj;
            dom.inDesc.value = item.desc;
            dom.inDept.value = item.dept;
            dom.inFoot.value = item.foot;
            updatePreview();
            dom.drawer.classList.add('translate-x-full');
            showToast('載入成功');
        };

        window.deleteNotice = (id) => {
            state.history = state.history.filter(h => h.id !== id);
            localStorage.setItem('notice_history', JSON.stringify(state.history));
            renderHistory();
        };

        document.getElementById('btn-save').addEventListener('click', saveHistory);
        document.getElementById('btn-history').addEventListener('click', () => dom.drawer.classList.remove('translate-x-full'));
        document.getElementById('close-drawer').addEventListener('click', () => dom.drawer.classList.add('translate-x-full'));

        // --- PDF 下載功能 ---
        document.getElementById('btn-download').addEventListener('click', async () => {
            if (state.isDownloading) return;
            state.isDownloading = true;
            showToast('正在產生高品質 PDF...');

            try {
                const element = document.getElementById('a4-preview');
                const originalStyle = element.getAttribute('style');
                
                // 暫時解除縮放進行截圖
                element.style.transform = 'none';
                element.style.position = 'fixed';
                element.style.top = '0';
                element.style.left = '0';
                element.style.zIndex = '-1';
                element.style.margin = '0';

                const canvas = await html2canvas(element, {
                    scale: 2.5, // 提高解析度
                    useCORS: true,
                    backgroundColor: '#ffffff',
                    width: 794,
                    height: 1123
                });

                element.setAttribute('style', originalStyle);

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 210, 297);
                pdf.save(`社區公告_${dom.inId.value || Date.now()}.pdf`);
                showToast('PDF 下載成功！');
            } catch (err) {
                console.error(err);
                showToast('下載失敗，請重試。');
            } finally {
                state.isDownloading = false;
            }
        });

        renderHistory();
    </script>
</body>
</html>
